<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Gaming Deals Notifier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .offline-container { max-width: 440px; }
    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.75rem; color: #fff; }
    p { font-size: 0.95rem; color: #888; line-height: 1.6; margin-bottom: 1.5rem; }
    .retry-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      color: #fff; font-weight: 600; font-size: 0.9rem;
      border: none; border-radius: 10px; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0,212,255,0.4); }
    .tips { margin-top: 2rem; font-size: 0.8rem; color: #555; }
    .tips span { display: block; margin-top: 0.3rem; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">🎮</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your wishlist and preferences are safe!</p>
    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>
    <div class="tips">
      <span>💡 Tip: Install this app for better offline support</span>
      <span>⭐ Your wishlist is saved locally and always available</span>
    </div>
  </div>
</body>
</html>
